<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Management — Catalyst Admin</title>
  <meta name="description" content="Catalyst Admin — Blog Content Management" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/admin.css" />
</head>
<body data-page="blog">

<div class="admin-layout">

  <!-- ───────────── SIDEBAR ───────────── -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-logo">Catalyst<span>AI</span></div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link" id="nav-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard</span>
      </a>
      <a href="leads.html" class="sidebar-link" id="nav-leads">
        <span class="nav-icon">👥</span>
        <span class="nav-text">Leads / CRM</span>
        <span class="nav-badge" id="leads-badge">0</span>
      </a>
      <a href="blog.html" class="sidebar-link active" id="nav-blog">
        <span class="nav-icon">📝</span>
        <span class="nav-text">Blog</span>
      </a>
      <a href="portfolio.html" class="sidebar-link" id="nav-portfolio">
        <span class="nav-icon">🎨</span>
        <span class="nav-text">Portfolio</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-link logout-btn" id="sidebar-logout-btn" onclick="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-text">Logout</span>
      </button>
    </div>
  </aside>

  <!-- ───────────── MAIN ───────────── -->
  <main class="admin-main">

    <!-- Topbar -->
    <div class="admin-topbar">
      <div style="flex:1;">
        <div class="topbar-greeting">Blog Management</div>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
      <button class="btn-primary" id="new-post-btn" onclick="openEditor(null)">+ New Post</button>
    </div>

    <!-- Content -->
    <div class="admin-content">

      <!-- Blog stats strip -->
      <div class="blog-stats-strip">
        <div class="blog-stat-item">
          <div class="blog-stat-value" id="stat-published">0</div>
          <div class="blog-stat-label">Published</div>
        </div>
        <div class="blog-stat-item">
          <div class="blog-stat-value" id="stat-drafts">0</div>
          <div class="blog-stat-label">Drafts</div>
        </div>
        <div class="blog-stat-item">
          <div class="blog-stat-value" id="stat-total-views">0</div>
          <div class="blog-stat-label">Total Views</div>
        </div>
      </div>

      <!-- Search bar for blog -->
      <div class="filters-bar">
        <input
          type="text"
          class="search-input"
          id="blog-search"
          placeholder="Search posts by title or tags..."
          oninput="filterBlogPosts()"
        />
        <select class="filter-select" id="blog-status-filter" onchange="filterBlogPosts()">
          <option value="">All</option>
          <option value="Published">Published</option>
          <option value="Draft">Draft</option>
        </select>
      </div>

      <!-- Blog Table -->
      <div class="data-section">
        <div class="data-section-header">
          <div class="data-section-title">All Posts</div>
          <div class="leads-count-label" id="blog-count">Loading...</div>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table" id="blog-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Views</th>
                <th>Tags</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="blog-tbody">
              <tr><td colspan="6" class="loading-cell">Loading posts...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ───────────── Editor Overlay ───────────── -->
<div class="editor-overlay" id="editor-overlay">
  <div class="editor-toolbar">
    <button class="btn-ghost" onclick="closeEditor()">← Back</button>
    <span class="editor-mode-label" id="editor-mode-label">New Post</span>
    <div style="display:flex;align-items:center;gap:10px;margin-right:8px;">
      <label class="toggle-label" for="post-published-toggle">Published</label>
      <div class="toggle-switch" id="post-published-toggle" onclick="this.classList.toggle('on');" title="Toggle published state"></div>
    </div>
    <button class="btn-ghost" id="save-draft-btn" onclick="savePost(false)">Save Draft</button>
    <button class="btn-primary" id="publish-btn" onclick="savePost(true)">Publish</button>
  </div>
  <div class="editor-body">
    <input type="hidden" id="editing-post-id" />

    <input
      class="editor-title-input"
      id="post-title"
      type="text"
      placeholder="Post title..."
      oninput="autoSlug()"
    />

    <div class="editor-meta-row">
      <div style="flex:1;">
        <label class="form-label">Slug</label>
        <input class="form-input" id="post-slug" type="text" placeholder="post-slug" />
      </div>
      <div style="flex:1;">
        <label class="form-label">Tags (comma separated)</label>
        <input class="form-input" id="post-tags" type="text" placeholder="AI, Automation, Web" />
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <label class="form-label">Excerpt</label>
      <textarea class="form-textarea" id="post-excerpt" rows="3" placeholder="Short description that appears in search results and previews..."></textarea>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <label class="form-label">Content</label>
      <textarea class="editor-content-area" id="post-content" placeholder="Write your post content here. Markdown supported..."></textarea>
    </div>

    <div class="editor-word-count" id="word-count">0 words</div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay" id="delete-post-modal">
  <div class="modal-card modal-small">
    <div class="modal-header">
      <div class="modal-title">Delete Post</div>
      <button class="modal-close" onclick="closeModal('delete-post-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">Are you sure you want to delete "<span id="delete-post-title-label" style="color:#f1f5f9;font-weight:600;"></span>"? This cannot be undone.</p>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeModal('delete-post-modal')">Cancel</button>
        <button class="btn-danger" id="confirm-delete-btn">Delete Post</button>
      </div>
    </div>
  </div>
</div>

<script src="../../js/admin.js"></script>
<script>
  /* ─── Utilities ─── */
  function logout() {
    localStorage.removeItem('catalyst_admin_token');
    window.location.href = 'index.html';
  }

  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.getElementById('topbar-date').textContent = new Intl.DateTimeFormat('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  }).format(new Date());

  /* ─── Demo Blog Data ─── */
  let allPosts = [
    { id: 1, title: 'How AI Automation is Transforming Indian SMEs', slug: 'ai-automation-indian-smes', excerpt: 'Discover how small and medium enterprises in India are leveraging AI to cut costs and boost efficiency.', tags: ['AI', 'Automation', 'SME'], content: 'Full article content here...', status: 'Published', views: 2847, date: '2026-05-28' },
    { id: 2, title: 'Building a Chatbot That Actually Converts',        slug: 'chatbot-that-converts',       excerpt: 'Most chatbots fail at conversion. Here\'s our proven framework for building AI chatbots with real ROI.',     tags: ['Chatbot', 'Conversion', 'AI'], content: 'Full article content here...', status: 'Published', views: 1923, date: '2026-05-20' },
    { id: 3, title: 'The Ultimate Guide to SaaS Development in 2026',   slug: 'saas-development-guide-2026', excerpt: 'Everything you need to know about building scalable, production-ready SaaS applications this year.',         tags: ['SaaS', 'Development'],     content: 'Full article content here...', status: 'Published', views: 3412, date: '2026-05-15' },
    { id: 4, title: 'Why Your Website Needs AI Right Now',              slug: 'website-needs-ai-now',        excerpt: 'Static websites are dying. Here\'s how to integrate AI features that keep visitors engaged.',               tags: ['AI', 'Website'],           content: 'Full article content here...', status: 'Published', views: 1567, date: '2026-05-10' },
    { id: 5, title: 'Catalyst AI Case Study: HealthCare Plus Chatbot',  slug: 'healthcare-plus-case-study',  excerpt: 'How we built a HIPAA-compliant AI chatbot that reduced support tickets by 60% for HealthCare Plus.',       tags: ['Case Study', 'Chatbot'],   content: 'Full article content here...', status: 'Draft',     views: 0,    date: '2026-06-01' },
    { id: 6, title: 'Top 10 AI Tools Every Agency Should Use in 2026',  slug: 'top-ai-tools-2026',           excerpt: 'Our curated list of AI tools that are changing the game for digital agencies worldwide.',                  tags: ['AI', 'Tools'],             content: 'Full article content here...', status: 'Draft',     views: 0,    date: '2026-06-03' },
  ];

  let filteredPosts = [...allPosts];
  let deletingPostId = null;

  /* ─── Stats ─── */
  function updateBlogStats() {
    const published = allPosts.filter(p => p.status === 'Published').length;
    const drafts    = allPosts.filter(p => p.status === 'Draft').length;
    const totalViews = allPosts.reduce((sum, p) => sum + p.views, 0);
    document.getElementById('stat-published').textContent  = published;
    document.getElementById('stat-drafts').textContent    = drafts;
    document.getElementById('stat-total-views').textContent = totalViews.toLocaleString();
  }

  /* ─── Render Table ─── */
  function renderBlogTable() {
    const tbody = document.getElementById('blog-tbody');
    document.getElementById('blog-count').textContent = `${filteredPosts.length} posts`;

    if (filteredPosts.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="loading-cell" style="color:rgba(255,255,255,0.3);">No posts found.</td></tr>`;
      return;
    }

    tbody.innerHTML = filteredPosts.map(p => {
      const isPublished = p.status === 'Published';
      const statusColor = isPublished ? '#22c55e' : '#f59e0b';
      const tagBadges   = (p.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join('');
      return `
        <tr>
          <td>
            <div style="font-weight:600;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${p.title}">${p.title}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px;">/${p.slug}</div>
          </td>
          <td>
            <span class="status-badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44;">${p.status}</span>
          </td>
          <td style="font-size:14px;font-weight:600;">${p.views > 0 ? p.views.toLocaleString() : '—'}</td>
          <td><div style="display:flex;gap:4px;flex-wrap:wrap;">${tagBadges}</div></td>
          <td style="font-size:12px;color:rgba(255,255,255,0.4);">${p.date}</td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="action-icon-btn" title="Edit" onclick="openEditor(getPost(${p.id}))">✏️</button>
              <button class="action-icon-btn danger" title="Delete" onclick="confirmDeletePost(${p.id})">🗑</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  function getPost(id) {
    return allPosts.find(p => p.id === id);
  }

  /* ─── Filter ─── */
  function filterBlogPosts() {
    const search = (document.getElementById('blog-search').value || '').toLowerCase();
    const status = document.getElementById('blog-status-filter').value;
    filteredPosts = allPosts.filter(p => {
      const matchSearch = !search || p.title.toLowerCase().includes(search) || (p.tags || []).some(t => t.toLowerCase().includes(search));
      const matchStatus = !status || p.status === status;
      return matchSearch && matchStatus;
    });
    renderBlogTable();
  }

  /* ─── Editor ─── */
  function openEditor(post) {
    document.getElementById('editor-overlay').classList.add('open');
    document.getElementById('editor-mode-label').textContent = post ? 'Edit Post' : 'New Post';
    document.getElementById('editing-post-id').value         = post ? post.id : '';
    document.getElementById('post-title').value              = post ? post.title   : '';
    document.getElementById('post-slug').value               = post ? post.slug    : '';
    document.getElementById('post-excerpt').value            = post ? post.excerpt : '';
    document.getElementById('post-tags').value               = post ? (post.tags || []).join(', ') : '';
    document.getElementById('post-content').value            = post ? post.content : '';

    const toggle = document.getElementById('post-published-toggle');
    if (post && post.status === 'Published') toggle.classList.add('on');
    else toggle.classList.remove('on');

    updateWordCount();
  }

  function closeEditor() {
    document.getElementById('editor-overlay').classList.remove('open');
  }

  /* ─── Auto-slug ─── */
  function autoSlug() {
    if (!document.getElementById('editing-post-id').value) {
      document.getElementById('post-slug').value = document.getElementById('post-title').value
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    }
    updateWordCount();
  }

  /* ─── Word count ─── */
  function updateWordCount() {
    const content = document.getElementById('post-content').value;
    const words   = content.trim() ? content.trim().split(/\s+/).length : 0;
    document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  }

  document.getElementById('post-content').addEventListener('input', updateWordCount);

  /* ─── Save Post ─── */
  function savePost(publish) {
    const id      = document.getElementById('editing-post-id').value;
    const title   = document.getElementById('post-title').value.trim();
    const slug    = document.getElementById('post-slug').value.trim();
    const excerpt = document.getElementById('post-excerpt').value.trim();
    const tags    = document.getElementById('post-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const content = document.getElementById('post-content').value;
    const toggle  = document.getElementById('post-published-toggle');
    const isPublished = publish || toggle.classList.contains('on');

    if (!title) { alert('Please enter a post title.'); return; }

    const postData = {
      title, slug: slug || title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
      excerpt, tags, content, status: isPublished ? 'Published' : 'Draft',
      date: new Date().toISOString().split('T')[0]
    };

    if (id) {
      const idx = allPosts.findIndex(p => p.id === parseInt(id));
      if (idx !== -1) {
        allPosts[idx] = { ...allPosts[idx], ...postData };
      }
    } else {
      postData.id    = Date.now();
      postData.views = 0;
      allPosts.unshift(postData);
    }

    filteredPosts = [...allPosts];
    updateBlogStats();
    renderBlogTable();
    closeEditor();
  }

  /* ─── Delete ─── */
  function confirmDeletePost(id) {
    deletingPostId = id;
    const post = allPosts.find(p => p.id === id);
    document.getElementById('delete-post-title-label').textContent = post ? post.title : '';
    openModal('delete-post-modal');
    document.getElementById('confirm-delete-btn').onclick = () => {
      allPosts     = allPosts.filter(p => p.id !== deletingPostId);
      filteredPosts = [...allPosts];
      updateBlogStats();
      renderBlogTable();
      closeModal('delete-post-modal');
    };
  }

  /* ─── Init ─── */
  updateBlogStats();
  renderBlogTable();
</script>
</body>
</html>
