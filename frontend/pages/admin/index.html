<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Catalyst</title>
  <meta name="description" content="Catalyst AI Agency Admin Portal — Restricted Access" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/admin.css" />
  <style>
    /* ─── Login-specific styles ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050810;
      position: relative;
    }

    /* ─── Animated gradient background ─── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        135deg,
        #050810 0%,
        #0a0e1a 20%,
        #060d20 40%,
        #080620 60%,
        #0a0e1a 80%,
        #050810 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── Particle orbs ─── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat linear infinite;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
      top: -120px; left: -120px;
      animation-duration: 20s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 25s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      top: 50%; left: 55%;
      animation-duration: 18s;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%       { transform: translate(30px, -20px) scale(1.05); }
      50%       { transform: translate(-20px, 30px) scale(0.97); }
      75%       { transform: translate(20px, 20px) scale(1.03); }
    }

    /* ─── Grid lines overlay ─── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── Login card ─── */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 420px;
      max-width: calc(100vw - 40px);
    }

    .login-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.12) inset;
      animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo ─── */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    .logo-text span {
      color: #3b82f6;
    }

    /* ─── Heading ─── */
    .login-heading {
      text-align: center;
      margin-bottom: 6px;
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .login-subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ─── Form ─── */
    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .form-input:focus {
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(59, 130, 246, 0.06);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    /* ─── Error ─── */
    .login-error {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #f87171;
      margin-bottom: 18px;
      animation: shakeError 0.3s ease;
    }

    .login-error.show {
      display: block;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    /* ─── Button ─── */
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
      margin-top: 4px;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.4s ease;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.5);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Demo hint ─── */
    .demo-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
    }

    .demo-hint code {
      color: rgba(59, 130, 246, 0.8);
      background: rgba(59, 130, 246, 0.1);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ─── Footer ─── */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.3px;
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 24px 0;
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-gradient"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-overlay"></div>

  <!-- Login card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Catalyst<span>AI</span></div>
      </div>

      <!-- Heading -->
      <div class="login-heading">Admin Portal</div>
      <div class="login-subtitle">Restricted Access</div>

      <!-- Form -->
      <div class="form-field">
        <label class="form-label" for="login-email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="login-email"
          placeholder="admin@catalyst.com"
          autocomplete="email"
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="login-password">Password</label>
        <input
          class="form-input"
          type="password"
          id="login-password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <!-- Error -->
      <div class="login-error" id="login-error"></div>

      <!-- Button -->
      <button class="login-btn" id="login-btn">Sign In</button>

      <!-- Demo hint -->
      <div class="demo-hint">
        Demo credentials: <code>admin@catalyst.com</code> / <code>admin123</code>
      </div>

      <div class="divider"></div>

      <!-- Footer -->
      <div class="login-footer">© 2026 Catalyst · Authorized Personnel Only</div>

    </div>
  </div>

  <script>
    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      // Clear previous errors
      errorDiv.classList.remove('show');
      errorDiv.textContent = '';

      if (!email || !password) {
        errorDiv.textContent = 'Please enter both email and password.';
        errorDiv.classList.add('show');
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('catalyst_admin_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorDiv.textContent = data.message || 'Invalid credentials. Please try again.';
          errorDiv.classList.add('show');
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch (e) {
        // For demo: accept admin@catalyst.com / admin123
        if (email === 'admin@catalyst.com' && password === 'admin123') {
          localStorage.setItem('catalyst_admin_token', 'demo_token_' + Date.now());
          window.location.href = 'dashboard.html';
        } else {
          errorDiv.textContent = 'Connection error. Try demo: admin@catalyst.com / admin123';
          errorDiv.classList.add('show');
        }
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });

    // Allow Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
